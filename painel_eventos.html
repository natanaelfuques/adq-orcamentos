<html lang="pt-BR">
<head>

<title>Painel de Eventos — Áudio de Qualidade</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
:root {
  --gold: #C8A94A;
  --gold-dim: rgba(200,169,74,0.15);
  --dark: #1a1a1a;
  --darker: #111111;
  --surface: #242424;
  --surface2: #2c2c2c;
  --border: #333;
  --border2: #3a3a3a;
  --text: #e8e8e8;
  --muted: #777;
  --montar: #4A90C8;
  --montar-dim: rgba(74,144,200,0.12);
  --andamento: #C8A94A;
  --andamento-dim: rgba(200,169,74,0.12);
  --concluido: #4AC87A;
  --concluido-dim: rgba(74,200,122,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--darker);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--darker);
  padding: 24px;
}

.login-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--gold);
  border-radius: 8px;
  padding: 40px 36px;
  width: 100%;
  max-width: 380px;
}

.login-logo {
  text-align: center;
  margin-bottom: 28px;
}

.login-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--gold);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.login-sub {
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 4px;
}

.login-field { margin-bottom: 16px; }

.login-field label {
  display: block;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}

.login-field input {
  width: 100%;
  background: var(--darker);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 0.95rem;
  padding: 11px 14px;
  border-radius: 4px;
  outline: none;
  transition: border-color 0.2s;
}

.login-field input:focus { border-color: var(--gold); }

.btn-login {
  width: 100%;
  padding: 13px;
  background: var(--gold);
  color: var(--dark);
  border: none;
  border-radius: 4px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.2s;
}

.btn-login:hover { opacity: 0.9; }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

.login-error {
  color: #e55;
  font-size: 0.8rem;
  margin-top: 10px;
  text-align: center;
  display: none;
}

/* ── APP ── */
#app-screen { display: none; }

header {
  background: var(--dark);
  border-bottom: 2px solid var(--gold);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-left .app-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--gold);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.header-left .app-sub {
  font-size: 0.65rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.user-badge {
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.btn-sair {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 6px 12px;
  border-radius: 4px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-sair:hover { border-color: #e55; color: #e55; }

/* ── KANBAN BOARD ── */
.board-container {
  padding: 24px;
  overflow-x: auto;
  min-height: calc(100vh - 60px);
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.board-container::-webkit-scrollbar { display: none; }

.board {
  display: flex;
  gap: 20px;
  min-width: fit-content;
  align-items: flex-start;
}



.column {
  width: min(320px, calc(100vw - 48px));
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  scroll-snap-align: start;
  scroll-snap-stop: always;
}

.column-header {
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.column-header .col-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.column-header .col-count {
  font-size: 0.72rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
}

.col-montar .col-title { color: var(--montar); }
.col-montar .col-count { background: var(--montar-dim); color: var(--montar); }
.col-montar { border-top: 3px solid var(--montar); }

.col-andamento .col-title { color: var(--andamento); }
.col-andamento .col-count { background: var(--andamento-dim); color: var(--andamento); }
.col-andamento { border-top: 3px solid var(--andamento); }

.col-concluido .col-title { color: var(--concluido); }
.col-concluido .col-count { background: var(--concluido-dim); color: var(--concluido); }
.col-concluido { border-top: 3px solid var(--concluido); }

.column-body {
  padding: 12px;
  min-height: 200px;
  transition: background 0.15s;
}

.column-body.drag-over { background: rgba(200,169,74,0.05); }

/* ── CARDS ── */
.evento-card {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 12px 16px;
  margin-bottom: 8px;
  cursor: grab;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  user-select: none;
}

.evento-card:hover {
  border-color: #444;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}

.evento-card.dragging {
  opacity: 0.4;
  cursor: grabbing;
}

/* Collapsed summary row */
.card-summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  cursor: pointer;
}

.card-summary-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.card-evento {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.03em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-data-badge {
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--gold);
  background: var(--gold-dim);
  padding: 3px 7px;
  border-radius: 3px;
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.06em;
}

.card-expand-icon {
  color: var(--muted);
  flex-shrink: 0;
  transition: transform 0.2s;
}

.evento-card.expanded .card-expand-icon {
  transform: rotate(180deg);
}

/* Expandable body */
.card-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.25s ease, opacity 0.2s;
  opacity: 0;
}

.evento-card.expanded .card-body {
  max-height: 800px;
  opacity: 1;
}

.card-body-inner {
  padding-top: 12px;
}

.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
}

.card-evento {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.03em;
  line-height: 1.2;
}

.card-data-badge {
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--gold);
  background: var(--gold-dim);
  padding: 3px 7px;
  border-radius: 3px;
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.06em;
}

.card-local {
  font-size: 0.78rem;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.card-horario-inline {
  font-size: 0.78rem;
  color: var(--text);
  font-weight: 600;
  white-space: nowrap;
}

.card-local-sep {
  color: var(--border);
  margin: 0 4px;
}

.card-resp {
  font-size: 0.72rem;
  color: var(--muted);
  margin-bottom: 10px;
}

.card-resp span { color: var(--text); }

.card-itens {
  border-top: 1px solid var(--border);
  padding-top: 10px;
  margin-top: 4px;
}

.card-itens-title {
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}

.card-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 0.8rem;
  color: var(--text);
}

.card-item:last-child { border-bottom: none; }

.item-check {
  width: 16px;
  height: 16px;
  min-width: 16px;
  border: 1.5px solid var(--border2);
  border-radius: 3px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}

.item-check.checked {
  background: var(--concluido);
  border-color: var(--concluido);
}

.item-check.checked::after {
  content: '';
  width: 9px;
  height: 5px;
  border-left: 2px solid #111;
  border-bottom: 2px solid #111;
  transform: rotate(-45deg) translateY(-1px);
  display: block;
}

.card-item.item-done .item-text {
  text-decoration: line-through;
  color: var(--muted);
}

/* ── EMPTY STATE ── */
.empty-col {
  text-align: center;
  padding: 32px 16px;
  color: var(--muted);
  font-size: 0.8rem;
}

/* ── LOADING ── */
.loading-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--muted);
  font-size: 0.85rem;
}

/* ── MOBILE ── */
@media (max-width: 700px) {
  .board-container { padding: 12px; }
  .column { width: calc(100vw - 24px); }
  .board { gap: 12px; }
  header { padding: 12px 16px; }
}

  /* ── FILTROS DE PERIODO ── */
  .periodo-bar {
    display: flex;
    gap: 8px;
    padding: 14px 24px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .periodo-bar::-webkit-scrollbar { display: none; }
  .periodo-btn {
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .periodo-btn:hover { border-color: var(--gold); color: var(--gold); }
  .periodo-btn.active { border-color: var(--gold); color: var(--dark); background: var(--gold); }

  /* ── SEPARADORES DE GRUPO ── */
  .group-separator {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 4px 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    margin-top: 4px;
  }
  .group-separator:first-child { margin-top: 0; }

  /* ── ANTERIORES ── */
  .anteriores-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 4px;
    cursor: pointer;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-top: 1px solid var(--border);
    margin-top: 8px;
    user-select: none;
  }
  .anteriores-toggle svg { transition: transform 0.2s; }
  .anteriores-toggle.open svg { transform: rotate(180deg); }
  .anteriores-body { display: none; }
  .anteriores-body.open { display: block; }
  .evento-card.passado { opacity: 0.6; }


  .card-cliente {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.02em;
  }
</style>

<script>
// ── Firebase Config ──
const firebaseConfig = {
  apiKey: "AIzaSyBX7qH0fY990F73VWlL7aTbSyG-OKsqkoY",
  authDomain: "adq-orcamentos.firebaseapp.com",
  projectId: "adq-orcamentos",
  storageBucket: "adq-orcamentos.firebasestorage.app",
  messagingSenderId: "3618259495",
  appId: "1:3618259495:web:4b749f1c9124f9c243c402"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Persist login
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

// ── Auth ──
auth.onAuthStateChanged(function(user) {
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    var name = user.email.split('@')[0];
    document.getElementById('user-name').textContent = name;
    iniciarBoard();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }
});

function fazerLogin() {
  var email = document.getElementById('login-email').value.trim();
  var senha = document.getElementById('login-senha').value;
  var btn = document.getElementById('btn-login');
  var err = document.getElementById('login-error');
  if (!email || !senha) { mostrarErro('Preencha e-mail e senha.'); return; }
  btn.disabled = true;
  btn.textContent = 'Entrando...';
  err.style.display = 'none';
  auth.signInWithEmailAndPassword(email, senha)
    .catch(function(e) {
      mostrarErro('E-mail ou senha incorretos.');
      btn.disabled = false;
      btn.textContent = 'Entrar';
    });
}

function mostrarErro(msg) {
  var err = document.getElementById('login-error');
  err.textContent = msg;
  err.style.display = 'block';
}

function sair() {
  auth.signOut();
}

// ── Board ──
var _draggingId = null;
var _todosEventos = [];

function iniciarBoard() {
  db.collection('eventos_campo')
    .orderBy('criadoEm', 'desc')
    .onSnapshot(function(snap) {
      _todosEventos = [];
      snap.forEach(function(doc) {
        _todosEventos.push(Object.assign({ id: doc.id }, doc.data()));
      });
      // Save expanded card before re-render
      var expandedCard = document.querySelector('.evento-card.expanded');
      var expandedId = expandedCard ? expandedCard.dataset.id : null;
      renderBoard();
      // Restore expanded state
      if (expandedId) {
        var card = document.querySelector('.evento-card[data-id="' + expandedId + '"]');
        if (card) card.classList.add('expanded');
      }
    });
}

function renderBoard() {
  var colunas = { montar: [], andamento: [], concluido: [] };
  _todosEventos.forEach(function(ev) {
    var col = ev.etapa || 'montar';
    if (colunas[col]) colunas[col].push(ev);
  });

  ['montar', 'andamento', 'concluido'].forEach(function(col) {
    var body = document.getElementById('body-' + col);
    var count = document.getElementById('count-' + col);

    // Split: past vs future/current, filtered by period
    var isRealizados = _periodo === 'realizados';
    var futuros = isRealizados
      ? colunas[col].filter(function(ev) { return isPast(ev); })
      : colunas[col].filter(function(ev) { return !isPast(ev) && matchesPeriodo(ev, _periodo); });
    var passados = isRealizados ? [] : colunas[col].filter(function(ev) { return isPast(ev); });

    // Sort by date ascending
    function sortByDate(arr) {
      return arr.slice().sort(function(a, b) {
        return (a.ev_data || '') > (b.ev_data || '') ? 1 : -1;
      });
    }
    futuros = sortByDate(futuros);
    passados = sortByDate(passados);

    count.textContent = futuros.length + (passados.length ? '+' + passados.length : '');

    if (futuros.length === 0 && passados.length === 0) {
      body.innerHTML = '<div class="empty-col">Nenhum evento</div>';
      return;
    }

    var html = '';

    // Group futuros by week/month label
    var grupos = {};
    var grupoOrder = [];
    futuros.forEach(function(ev) {
      var label = getWeekLabel(ev);
      if (!grupos[label]) { grupos[label] = []; grupoOrder.push(label); }
      grupos[label].push(ev);
    });

    grupoOrder.forEach(function(label) {
      html += '<div class="group-separator">' + label + '</div>';
      grupos[label].forEach(function(ev) { html += buildCard(ev); });
    });

    // Anteriores
    if (passados.length > 0) {
      html += '<div class="anteriores-toggle" id="ant-toggle-' + col + '" onclick="toggleAnteriores(\'' + col + '\')">' +
        '<svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1,3 5,7 9,3"/></svg>' +
        'Anteriores (' + passados.length + ')</div>';
      html += '<div class="anteriores-body" id="ant-body-' + col + '">';
      passados.forEach(function(ev) { html += buildCard(ev, true); });
      html += '</div>';
    }

    body.innerHTML = html;

    // Events
    body.querySelectorAll('.evento-card').forEach(function(card) {
      card.addEventListener('dragstart', function(e) { onDragStart(e, card.dataset.id); });
      card.addEventListener('dragend', function() { card.classList.remove('dragging'); });
    });
    body.querySelectorAll('.card-summary').forEach(function(summary) {
      summary.addEventListener('click', function(e) {
        if (e.target.closest('.item-check')) return;
        var card = summary.closest('.evento-card');
        if (!card) return;
        var wasExpanded = card.classList.contains('expanded');
        // Collapse all cards
        document.querySelectorAll('.evento-card.expanded').forEach(function(c) {
          c.classList.remove('expanded');
        });
        // Expand this one if it was collapsed
        if (!wasExpanded) card.classList.add('expanded');
      });
    });
    body.querySelectorAll('.item-check').forEach(function(chk) {
      chk.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleItem(chk.dataset.evid, parseInt(chk.dataset.idx));
      });
    });
  });
}

function buildCard(ev, past) {
  var dataFmt = ev.ev_data ? ev.ev_data.split('-').reverse().join('/') : '';
  var horario = '';
  if (ev.ev_inicio || ev.ev_fim) {
    horario = (ev.ev_inicio || '') + (ev.ev_fim ? ' - ' + ev.ev_fim : '');
  }
  var resp = ev.ev_resp ? '<div class="card-resp">Resp: <span>' + esc(ev.ev_resp) + '</span></div>' : '';
  var itens = '';
  if (ev.servicos && ev.servicos.length) {
    var itensHtml = ev.servicos.map(function(s, i) {
      var done = ev.itens_ok && ev.itens_ok[i];
      return '<div class="card-item' + (done ? ' item-done' : '') + '">' +
        '<div class="item-check' + (done ? ' checked' : '') + '" data-evid="' + esc(ev.id) + '" data-idx="' + i + '"></div>' +
        '<span class="item-text">' + esc(s) + '</span>' +
        '</div>';
    }).join('');
    itens = '<div class="card-itens"><div class="card-itens-title">Itens</div>' + itensHtml + '</div>';
  }

  return '<div class="evento-card' + (past ? ' passado' : '') + '" draggable="true" data-id="' + esc(ev.id) + '">' +
    '<div class="card-summary" data-toggle="' + esc(ev.id) + '">' +
      '<div class="card-summary-left">' +
        (dataFmt ? '<div class="card-data-badge">' + dataFmt + '</div>' : '') +
        '<div>' +
          '<div class="card-evento">' + esc(ev.ev_nome || ev.nome || 'Evento') + '</div>' +
          (ev.cli_nome ? '<div class="card-cliente">' + esc(ev.cli_nome) + '</div>' : '') +
        '</div>' +
      '</div>' +
      '<svg class="card-expand-icon" width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,4 6,8 10,4"/></svg>' +
    '</div>' +
    '<div class="card-body">' +
      '<div class="card-body-inner">' +
        '<div class="card-local">' +
          (horario ? '<span class="card-horario-inline">' + esc(horario) + '</span><span class="card-local-sep">·</span>' : '') +
          '<svg width="10" height="13" viewBox="0 0 10 13" fill="none" style="flex-shrink:0;opacity:0.5"><path d="M5 0C2.24 0 0 2.24 0 5c0 3.75 5 8 5 8s5-4.25 5-8c0-2.76-2.24-5-5-5zm0 6.5A1.5 1.5 0 1 1 5 3.5a1.5 1.5 0 0 1 0 3z" fill="currentColor"/></svg> ' +
          esc(ev.ev_local || '') +
        '</div>' +
        resp + itens +
      '</div>' +
    '</div>' +
    '</div>';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Drag & Drop ──
function onDragStart(e, id) {
  _draggingId = id;
  setTimeout(function() {
    var card = document.querySelector('[data-id="' + id + '"]');
    if (card) card.classList.add('dragging');
  }, 0);
  e.dataTransfer.effectAllowed = 'move';
}

function onDragOver(e, col) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.getElementById('body-' + col).classList.add('drag-over');

}

function onDragLeave(e) {
  ['montar','andamento','concluido'].forEach(function(col) {
    var body = document.getElementById('body-' + col);
    if (body) body.classList.remove('drag-over');
  });
}

function onDrop(e, col) {
  e.preventDefault();
  onDragLeave(e);
  if (!_draggingId) return;
  db.collection('eventos_campo').doc(_draggingId).update({ etapa: col })
    .catch(function(err) { console.error('Erro ao mover card:', err); });
  _draggingId = null;
}

// ── Item check ──
function toggleItem(evId, idx) {
  var ev = _todosEventos.find(function(e) { return e.id === evId; });
  if (!ev) return;
  var itensOk = Object.assign({}, ev.itens_ok || {});
  itensOk[idx] = !itensOk[idx];
  db.collection('eventos_campo').doc(evId).update({ itens_ok: itensOk });
}
</script>

      .catch(function(e){ console.warn("[Painel] SW erro:", e); });
  }

  var deferredPrompt = null;
  window.addEventListener("beforeinstallprompt", function(e) {
    e.preventDefault();
    deferredPrompt = e;
    var btn = document.getElementById("pwa-install-btn");
    if (btn) btn.style.display = "flex";
  });
  window.addEventListener("appinstalled", function() {
    var btn = document.getElementById("pwa-install-btn");
    if (btn) btn.style.display = "none";
  });
  window.adqInstall = function() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function() {
      deferredPrompt = null;
      var btn = document.getElementById("pwa-install-btn");
      if (btn) btn.style.display = "none";
    });
  };
})();

// ═══ FILTRO DE PERIODO ═══
var _periodo = 'semana';

function setPeriodo(p) {
  _periodo = p;
  document.querySelectorAll('.periodo-btn').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.getElementById('periodo-' + p);
  if (btn) btn.classList.add('active');
  renderBoard();
}

function getWeekRange() {
  var now = new Date();
  var day = now.getDay(); // 0=sun
  var monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  monday.setHours(0,0,0,0);
  var sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23,59,59,999);
  return { start: monday, end: sunday };
}

function matchesPeriodo(ev, periodo) {
  if (periodo === 'todos') return true;
  if (periodo === 'realizados') return isPast(ev);
  if (!ev.ev_data) return false;
  var parts = ev.ev_data.split('-');
  var evDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  var now = new Date();
  if (periodo === 'semana') {
    var range = getWeekRange();
    return evDate >= range.start && evDate <= range.end;
  }
  if (periodo === 'mes') {
    return evDate.getMonth() === now.getMonth() && evDate.getFullYear() === now.getFullYear();
  }
  if (periodo === 'ano') {
    return evDate.getFullYear() === now.getFullYear();
  }
  return true;
}

function isPast(ev) {
  if (!ev.ev_data) return false;
  var parts = ev.ev_data.split('-');
  var evDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  evDate.setHours(23,59,59,999);
  return evDate < new Date();
}

function getWeekLabel(ev) {
  if (!ev.ev_data) return 'Sem data';
  var parts = ev.ev_data.split('-');
  var evDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  var now = new Date();
  var range = getWeekRange();
  if (evDate >= range.start && evDate <= range.end) return 'Esta semana';
  var nextStart = new Date(range.start); nextStart.setDate(range.start.getDate() + 7);
  var nextEnd = new Date(range.end); nextEnd.setDate(range.end.getDate() + 7);
  if (evDate >= nextStart && evDate <= nextEnd) return 'Proxima semana';
  var meses = ['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return meses[evDate.getMonth()] + ' ' + evDate.getFullYear();
}

function toggleAnteriores(col) {
  var toggle = document.getElementById('ant-toggle-' + col);
  var body = document.getElementById('ant-body-' + col);
  if (toggle) toggle.classList.toggle('open');
  if (body) body.classList.toggle('open');
}
