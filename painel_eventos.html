  --surface2: #2c2c2c;
  --border: #333;
  --border2: #3a3a3a;
  --text: #e8e8e8;
  --muted: #888;
  --montar: #4A90C8;
  --montar-dim: rgba(74,144,200,0.12);
  --andamento: #C8A94A;
  --andamento-dim: rgba(200,169,74,0.12);
  --concluido: #4AC87A;
  --concluido-dim: rgba(74,200,122,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--darker);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--darker);
  padding: 24px;
}

.login-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--gold);
  border-radius: 8px;
  padding: 40px 36px;
  width: 100%;
  max-width: 380px;
}

.login-logo {
  text-align: center;
  margin-bottom: 28px;
}

.login-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--gold);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.login-sub {
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 4px;
}

.login-field { margin-bottom: 16px; }

.login-field label {
  display: block;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}

.login-field input {
  width: 100%;
  background: var(--darker);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 0.95rem;
  padding: 11px 14px;
  border-radius: 4px;
  outline: none;
  transition: border-color 0.2s;
}

.login-field input:focus { border-color: var(--gold); }

.btn-login {
  width: 100%;
  padding: 13px;
  background: var(--gold);
  color: var(--dark);
  border: none;
  border-radius: 4px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.2s;
}

.btn-login:hover { opacity: 0.9; }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

.login-error {
  color: #e55;
  font-size: 0.8rem;
  margin-top: 10px;
  text-align: center;
  display: none;
}

/* ── APP ── */
#app-screen { display: none; }

header {
  background: var(--dark);
  border-bottom: 2px solid var(--gold);
  padding: 10px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}











.btn-refresh {
  background: transparent;
  border: 1px solid #444;
  color: #aaa;
  border-radius: 4px;
  padding: 0;
  width: 26px;
  height: 26px;
  box-sizing: border-box;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: border-color 0.15s, color 0.15s;
}
.btn-refresh:hover { border-color: var(--gold); color: var(--gold); }
.btn-refresh.spinning { border-color: var(--gold); color: var(--gold); }
.btn-refresh.spinning svg { animation: spin 0.8s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.btn-sair {
  background: transparent;
  border: 1px solid #444;
  color: #aaa;
  border-radius: 4px;
  padding: 4px 10px;
  font-family: 'Barlow', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  cursor: pointer;
  height: 26px;
  box-sizing: border-box;
  line-height: 1;
  transition: background 0.18s, border-color 0.18s, color 0.18s;
}
.btn-sair:hover { border-color: #e55; color: #e55; }

.btn-config-painel {
  background: transparent;
  border: 1px solid #444;
  color: #aaa;
  border-radius: 4px;
  padding: 0;
  width: 26px;
  height: 26px;
  box-sizing: border-box;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: border-color 0.15s, color 0.15s;
}
.btn-config-painel:hover { border-color: var(--gold); color: var(--gold); }

/* Editor mode */
.editor-mode .card-field-editable {
  cursor: pointer;
  border-bottom: 1px dashed rgba(200,169,74,0.3);
  transition: border-color 0.15s;
}
.editor-mode .card-field-editable:hover {
  border-bottom-color: var(--gold);
}
/* No modo editor, o link do Maps se comporta como texto editável */
.editor-mode .card-local-link {
  text-decoration: none !important;
  pointer-events: none;
}
.editor-mode .card-local-link.card-field-editable {
  pointer-events: auto;
}
.editor-input-inline {
  background: #0e0e0e;
  border: 1px solid var(--gold);
  color: #ccc;
  padding: 3px 6px;
  border-radius: 3px;
  font-family: 'Barlow', sans-serif;
  font-size: inherit;
  width: 100%;
  box-sizing: border-box;
}
.editor-input-inline:focus { outline: none; border-color: #d4b85a; }
.editor-banner {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: #1a1a0a;
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 8px 20px;
  border-radius: 20px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  z-index: 999;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  gap: 8px;
  animation: editorPulse 2s ease-in-out infinite alternate;
}
@keyframes editorPulse { from { box-shadow: 0 4px 16px rgba(0,0,0,0.5); } to { box-shadow: 0 4px 16px rgba(200,169,74,0.25); } }

/* ── KANBAN BOARD ── */
.board-container {
  padding: 24px;
  overflow-x: auto;
  min-height: calc(100vh - 60px);
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.board-container::-webkit-scrollbar { display: none; }

.board {
  display: flex;
  gap: 20px;
  min-width: fit-content;
  align-items: flex-start;
}



.column {
  width: min(320px, calc(100vw - 48px));
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 120px);
}

.column-body {
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  flex: 1;
}

.column-header {
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.column-header .col-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.column-header .col-count {
  font-size: 0.72rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
}

.col-eventos { border-top: none; }
.col-andamento { border-top: none; }
.col-concluido { border-top: none; }

/* Barra visual de status no topo das colunas */
.column-status-bar {
  height: 4px;
  width: 100%;
  border-radius: 8px 8px 0 0;
}
.col-eventos .column-status-bar {
  background: linear-gradient(90deg, var(--montar), rgba(74,144,200,0.4));
  box-shadow: 0 0 8px rgba(74,144,200,0.5);
}
.col-andamento .column-status-bar {
  background: linear-gradient(90deg, var(--andamento), rgba(200,169,74,0.4));
  box-shadow: 0 0 8px rgba(200,169,74,0.5);
}
.col-concluido .column-status-bar {
  background: linear-gradient(90deg, var(--concluido), rgba(74,200,122,0.4));
  box-shadow: 0 0 8px rgba(74,200,122,0.5);
}

.column-body {
  padding: 12px;
  min-height: 200px;
  transition: background 0.15s;
  -webkit-overflow-scrolling: touch;
}

.column-body::-webkit-scrollbar { width: 4px; }
.column-body::-webkit-scrollbar-track { background: transparent; }
.column-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.column-body.drag-over { background: rgba(123,34,184,0.05); }

/* ── CARDS ── */
.evento-card {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 12px 16px;
  margin-bottom: 8px;
  cursor: grab;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  overflow: hidden;
}

.evento-card:hover {
  border-color: #444;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}

.evento-card.dragging {
  opacity: 0.4;
  cursor: grabbing;
}

/* Collapsed summary row */
.card-summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  cursor: pointer;
}

.card-summary-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.card-evento {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.03em;
  white-space: normal;
  overflow: visible;
  word-break: break-word;
  min-width: 0;
  flex: 1;
}

.card-data-badge {
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--gold);
  background: var(--gold-dim);
  padding: 3px 7px;
  border-radius: 3px;
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.06em;
}

.card-expand-icon {
  color: var(--muted);
  flex-shrink: 0;
  transition: transform 0.2s;
}

.evento-card.expanded .card-expand-icon { transform: rotate(180deg); }

/* Expandable body */
.card-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.25s ease, opacity 0.2s;
  opacity: 0;
}

.evento-card.expanded .card-body { max-height: 2000px; opacity: 1; }

.card-body-inner {
  padding-top: 12px;
}

.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
}





.card-local {
  font-size: 0.78rem;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-wa-painel {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 2px 5px;
  border-radius: 3px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  line-height: 1;
  flex-shrink: 0;
  transition: border-color 0.15s, color 0.15s;
}
.btn-wa-painel.tem-fone {
  color: #bbb;
}
.btn-wa-painel:hover {
  border-color: #25D366 !important;
  color: #25D366 !important;
}

.card-horario-block {
  font-size: 0.78rem;
  color: var(--text);
  font-weight: 600;
  margin-bottom: 4px;
}

.card-horario-block .horario-sep {
  color: var(--muted);
  margin: 0 3px;
  font-weight: 400;
}

.card-horario-inline {
  font-size: 0.78rem;
  color: var(--text);
  font-weight: 600;
  white-space: nowrap;
}

.card-local-sep {
  color: var(--border);
  margin: 0 4px;
}

.card-resp {
  font-size: 0.72rem;
  color: var(--muted);
  margin-bottom: 10px;
}

.card-resp span { color: var(--text); }

/* Barrinha de responsáveis no topo do card */
.card-resp-bar {
  height: 3px;
  width: calc(100% + 32px);
  margin: -12px -16px 10px -16px;
  border-radius: 6px 6px 0 0;
  display: flex;
  flex-shrink: 0;
  overflow: hidden;
  opacity: 0.85;
}
.card-resp-bar-track {
  flex: 1;
  height: 100%;
  background: linear-gradient(to right, rgba(120,120,130,0.25), rgba(120,120,130,0.45));
  border-radius: 6px 0 0 0;
}
.card-resp-bar-colors {
  display: flex;
  height: 100%;
  gap: 2px;
  overflow: hidden;
}
.card-resp-bar-color {
  width: 18px;
  height: 100%;
}
.card-resp-bar-colors .card-resp-bar-color:last-child {
  border-radius: 0 6px 0 0;
}


/* Referência clicável no card */
.card-ref-link {
  cursor: pointer;
  color: var(--muted);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  flex-shrink: 0;
  margin-left: 8px;
  transition: color 0.15s;
  text-decoration: none;
  border-bottom: 1px dashed transparent;
  user-select: none;
}
.card-ref-link:hover {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

/* Modal de responsáveis */
.modal-resp-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.82);
  z-index: 1100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-resp-box {
  background: #1a1a1a;
  border: 1px solid var(--gold);
  border-radius: 10px;
  width: 100%;
  max-width: 380px;
  overflow: hidden;
}
.modal-resp-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 12px 20px;
  border-bottom: 1px solid #2a2a2a;
}
.modal-resp-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 800;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
.modal-resp-list {
  padding: 12px 20px;
  max-height: 300px;
  overflow-y: auto;
}
.modal-resp-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 5px;
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 4px;
}
.modal-resp-item:hover { background: #252525; }
.modal-resp-item.selected { background: rgba(123,34,184,0.12); }
.modal-resp-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
.modal-resp-name {
  font-size: 0.78rem;
  color: #ccc;
  flex: 1;
}
.modal-resp-check {
  width: 16px;
  height: 16px;
  border: 1.5px solid #444;
  border-radius: 3px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, border-color 0.15s;
}
.modal-resp-item.selected .modal-resp-check {
  background: var(--gold);
  border-color: var(--gold);
}
.modal-resp-footer {
  padding: 12px 20px;
  border-top: 1px solid #2a2a2a;
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/* Seletor de cor inline no painel admin */
.color-swatch {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  flex-shrink: 0;
  transition: border-color 0.15s, transform 0.15s;
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.active { border-color: #fff; }
.color-picker-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}

/* Usuário no painel admin */
.adm-user-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid #1e1e1e;
}
.adm-user-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
.adm-user-email {
  font-size: 0.74rem;
  color: #ccc;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.card-itens {
  border-top: 1px solid var(--border);
  padding-top: 10px;
  margin-top: 4px;
}

.card-itens-title {
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}

.card-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 0.8rem;
  color: var(--text);
}

.card-item:last-child { border-bottom: none; }

.item-check {
  width: 16px;
  height: 16px;
  min-width: 16px;
  border: 1.5px solid var(--border2);
  border-radius: 3px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}

.item-check.checked {
  background: var(--concluido);
  border-color: var(--concluido);
}

.item-check.checked::after {
  content: '';
  width: 9px;
  height: 5px;
  border-left: 2px solid #111;
  border-bottom: 2px solid #111;
  transform: rotate(-45deg) translateY(-1px);
  display: block;
}

.card-item.item-done .item-text {
  /* checklist marcado: sem risco, só caixinha verde */
}

.card-item.item-removido .item-text { text-decoration: line-through; opacity: 0.5; color: var(--muted); }

.item-extra-tag {
  font-size: 0.85rem;
  font-weight: 700;
  color: #4A90C8;
  flex-shrink: 0;
  line-height: 1;
}

.btn-add-item {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 8px;
  background: transparent;
  border: 1px dashed var(--border);
  color: var(--muted);
  border-radius: 4px;
  padding: 5px 10px;
  font-family: 'Barlow', sans-serif;
  font-size: 0.72rem;
  cursor: pointer;
  width: 100%;
  text-align: left;
  transition: all 0.15s;
}
.btn-add-item:hover { border-color: var(--gold); color: var(--gold); }

.add-item-form { display: flex; gap: 6px; margin-top: 8px; }
.add-item-input {
  flex: 1;
  background: #2a2a2a;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 0.8rem;
  padding: 5px 8px;
  outline: none;
}
.add-item-input:focus { border-color: var(--gold); }
.btn-add-item-ok {
  background: var(--gold);
  color: #111;
  border: none;
  border-radius: 4px;
  padding: 5px 10px;
  font-weight: 700;
  font-size: 0.75rem;
  cursor: pointer;
  font-family: 'Barlow', sans-serif;
}

/* ── HEADER COMPARTILHADO ── */
.hd-row1 {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  min-width: 0;
}

.hd-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.35rem;
  font-weight: 800;
  color: var(--gold);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
  flex-shrink: 1;
  line-height: 1.15;
}

.hd-row2 {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 2px;
  gap: 8px;
}

.hd-sub {
  font-size: 0.62rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.hd-date {
  font-size: 0.6rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  white-space: nowrap;
  text-align: right;
  flex-shrink: 0;
}

.hd-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.hd-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}

.hd-user {
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
}

/* ── EMPTY STATE ── */
.empty-col {
  text-align: center;
  padding: 32px 16px;
  color: var(--muted);
  font-size: 0.8rem;
}

/* ── LOADING ── */
.loading-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--muted);
  font-size: 0.85rem;
}

/* ── MOBILE ── */
@media (max-width: 700px) {
  header { padding: 8px 12px; }
  .hd-date { display: none; }
  .hd-user { display: none; }
  .hd-title { font-size: 1.1rem; }
  .hd-actions { gap: 5px; }
}

  /* ── FILTROS DE PERIODO ── */
  .periodo-bar {
    display: flex;
    gap: 8px;
    padding: 14px 24px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .periodo-bar::-webkit-scrollbar { display: none; }
  .periodo-btn {
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .periodo-btn:hover { border-color: var(--gold); color: var(--gold); }
  .periodo-btn.active { border-color: var(--gold); color: var(--dark); background: var(--gold); }

  /* ── SEPARADORES DE GRUPO ── */
  .group-separator {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 4px 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    margin-top: 4px;
  }
  .group-separator:first-child { margin-top: 0; }

  /* ── ANTERIORES ── */

  .evento-card.passado { opacity: 0.6; }


  .card-cliente {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.02em;
  }

  
  
  
  .btn-acessos { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 4px; padding: 5px 8px; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: 'Barlow', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
  .btn-acessos:hover { border-color: var(--gold); color: var(--gold); }
  .acessos-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: flex-start; justify-content: flex-end; padding: 60px 16px 16px; }
  .acessos-overlay.open { display: flex; }
  .acessos-modal { background: #1e1e1e; border: 1px solid var(--border); border-radius: 8px; width: 100%; max-width: 340px; max-height: 70vh; overflow-y: auto; }
  .acessos-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .acessos-title { font-family: 'Barlow Condensed', sans-serif; font-size: 0.8rem; font-weight: 700; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; }
  .acessos-close { background: none; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; padding: 0 4px; }
  .acessos-close:hover { color: var(--text); }
  .acesso-item { padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .acesso-item:last-child { border-bottom: none; }
  .acesso-user { font-size: 0.8rem; font-weight: 700; color: var(--text); }
  .acesso-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .acessos-empty { padding: 20px 16px; text-align: center; color: var(--muted); font-size: 0.8rem; }
  .log-grupo { border-bottom: 1px solid var(--border); }
  .log-grupo:last-child { border-bottom: none; }
  .log-grupo-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; cursor: pointer; user-select: none;
    transition: background 0.15s;
  }
  .log-grupo-header:hover { background: rgba(255,255,255,0.03); }
  .log-grupo-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem; font-weight: 700;
    color: var(--gold); letter-spacing: 0.12em; text-transform: uppercase;
  }
  .log-grupo-direita { display: flex; align-items: center; gap: 10px; }
  .log-grupo-count {
    font-size: 0.68rem; font-weight: 700;
    color: #555; background: rgba(255,255,255,0.05);
    padding: 1px 7px; border-radius: 10px;
  }
  .log-grupo-chevron { color: var(--muted); font-size: 0.6rem; transition: transform 0.2s; display: inline-block; }
  .log-grupo.aberto .log-grupo-chevron { transform: rotate(180deg); }
  .log-grupo-body { display: none; }
  .log-grupo.aberto .log-grupo-body { display: block; }

/* ── Seletor de Veículo ── */
.veiculo-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.veiculo-icon-btn {
  background: none;
  border: 1px solid transparent;
  border-radius: 4px;
  padding: 1px 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: border-color 0.15s, background 0.15s;
  flex-shrink: 0;
}
.veiculo-icon-btn:hover { border-color: var(--border2); background: rgba(255,255,255,0.04); }
.veiculo-icon-btn.tem-veiculo { border-color: rgba(212,175,55,0.3); }
.veiculo-icon-btn img { height: 22px; width: auto; display: block; }
.veiculo-icon-btn .veiculo-label {
  font-size: 0.6rem;
  color: var(--muted);
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  white-space: nowrap;
}
.veiculo-icon-btn.tem-veiculo .veiculo-label { color: var(--gold); }

/* Popover de seleção */
.veiculo-popover {
  position: absolute;
  z-index: 500;
  background: #1c1c1c;
  border: 1px solid var(--gold);
  border-radius: 8px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.7);
  min-width: 160px;
}
.veiculo-popover-title {
  font-size: 0.6rem;
  font-weight: 800;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 2px;
}
.veiculo-opt {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 6px 8px;
  border-radius: 5px;
  border: 1px solid transparent;
  transition: background 0.15s, border-color 0.15s;
}
.veiculo-opt:hover { background: #2a2a2a; border-color: var(--border2); }
.veiculo-opt.selecionado { border-color: var(--gold); background: rgba(212,175,55,0.08); }
.veiculo-opt img { height: 30px; width: auto; }
.veiculo-opt-nome {
  font-size: 0.7rem;
  font-weight: 700;
  color: #ccc;
  white-space: nowrap;
}
.veiculo-opt-none {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 5px 8px;
  border-radius: 5px;
  font-size: 0.68rem;
  color: var(--muted);
  border: 1px solid transparent;
  transition: background 0.15s;
}
.veiculo-opt-none:hover { background: #2a2a2a; color: #e05c5c; }

</style>

<!-- LOGIN -->

    <div class="login-field">
      <label>E-mail</label>

      <label>Senha</label>

</div>

// ── Board ──
var _draggingId = null;
var _todosEventos = [];

function iniciarBoard() {
  sincronizarPainel();
  db.collection('eventos_campo')
    .orderBy('criadoEm', 'desc')
    .onSnapshot(function(snap) {
      _todosEventos = [];
      _eventosCache = {};
      snap.forEach(function(doc) {
        var ev = Object.assign({ id: doc.id }, doc.data());
        // ── Migração: expandir itens com "•" em entradas separadas ──
        // Corrige contratos antigos cujos serviços foram colados juntos num único campo.
        if (ev.servicos && ev.servicos.some(function(s) {
          return s && (s.indexOf('•') >= 0 || s.indexOf('·') >= 0);
        })) {
          var servicosExpandidos = [];
          ev.servicos.forEach(function(s) {
            if (s && (s.indexOf('•') >= 0 || s.indexOf('·') >= 0)) {
              s.split(/\s*[•·]\s*/).forEach(function(parte) {
                var p = parte.trim();
                if (p) servicosExpandidos.push(p);
              });
            } else if (s && s.trim()) {
              servicosExpandidos.push(s.trim());
            }
          });
          ev.servicos = servicosExpandidos;
          // Persistir versão corrigida (itens_ok zerado pois índices mudaram)
          db.collection('eventos_campo').doc(doc.id)
            .update({ servicos: servicosExpandidos, itens_ok: {} })
            .catch(function(e) { console.warn('[AdQ] Erro ao migrar serviços:', e); });
        }
        _todosEventos.push(ev);
        _eventosCache[doc.id] = ev;
      });
      // Save expanded card before re-render
      var expandedCard = document.querySelector('.evento-card.expanded');
      var expandedId = expandedCard ? expandedCard.dataset.id : null;
      renderBoard();
      // Restore expanded state
      if (expandedId) {
        var card = document.querySelector('.evento-card[data-id="' + expandedId + '"]');
        if (card) card.classList.add('expanded');
      }
    });
}

function renderBoard() {
  var colunas = { eventos: [], andamento: [], concluido: [] };
  _todosEventos.forEach(function(ev) {
    var col = ev.etapa || 'eventos';
    if (colunas[col]) colunas[col].push(ev);
  });

  ['eventos', 'andamento', 'concluido'].forEach(function(col) {
    var body = document.getElementById('body-' + col);
    var count = document.getElementById('count-' + col);

    // Split: past vs future/current, filtered by period
    var isRealizados = _periodo === 'realizados';
    var futuros = isRealizados
      ? colunas[col].filter(function(ev) { return isPast(ev); })
      : colunas[col].filter(function(ev) { return !isPast(ev) && matchesPeriodo(ev, _periodo); });
    var passados = isRealizados ? [] : colunas[col].filter(function(ev) { return isPast(ev); });

    // Sort by date ascending
    function sortByDate(arr) {
      return arr.slice().sort(function(a, b) {
        return (a.ev_data || '') > (b.ev_data || '') ? 1 : -1;
      });
    }
    futuros = sortByDate(futuros);
    passados = sortByDate(passados);

    count.textContent = futuros.length + passados.length;

    if (futuros.length === 0 && passados.length === 0) {
      body.innerHTML = '<div class="empty-col">Nenhum evento</div>';
      return;
    }

    var html = '';

    // Group futuros by week/month label
    var grupos = {};
    var grupoOrder = [];
    futuros.forEach(function(ev) {
      var label = getWeekLabel(ev);
      if (!grupos[label]) { grupos[label] = []; grupoOrder.push(label); }
      grupos[label].push(ev);
    });

    grupoOrder.forEach(function(label) {
      html += '<div class="group-separator">' + label + '</div>';
      grupos[label].forEach(function(ev) { html += buildCard(ev, false, col); });
    });

    // Passados — exibidos diretamente sem separação
    passados.forEach(function(ev) { html += buildCard(ev, true, col); });

    body.innerHTML = html;

    // Events
    body.querySelectorAll('.evento-card').forEach(function(card) {
      card.addEventListener('dragstart', function(e) { onDragStart(e, card.dataset.id); });
      card.addEventListener('dragend', function() {
          card.classList.remove('dragging');
          card.classList.remove('expanded');
          document.removeEventListener('dragover', onDragScroll);
          snapBoardToColumn();
        });
    });
    body.querySelectorAll('.card-summary').forEach(function(summary) {
      summary.addEventListener('click', function(e) {
        if (e.target.closest('.item-check')) return;
        var card = summary.closest('.evento-card');
        if (!card) return;
        var wasExpanded = card.classList.contains('expanded');
        // Collapse all cards
        document.querySelectorAll('.evento-card.expanded').forEach(function(c) {
          c.classList.remove('expanded');
        });
        // Expand this one if it was collapsed
        if (!wasExpanded) {
          card.classList.add('expanded');
          // Scroll card into view inside column after transition starts
          setTimeout(function() {
            var colBody = card.closest('.column-body');
            if (colBody) {
              var cardRect = card.getBoundingClientRect();
              var colRect = colBody.getBoundingClientRect();
              if (cardRect.bottom > colRect.bottom) {
                colBody.scrollBy({ top: cardRect.bottom - colRect.bottom + 16, behavior: 'smooth' });
              }
            }
          }, 50);
        }
      });
    });
    body.querySelectorAll('.item-check').forEach(function(chk) {
      chk.addEventListener('click', function(e) {
        e.stopPropagation();
        var idx = chk.dataset.idx;
        toggleItem(chk.dataset.evid, isNaN(idx) ? idx : parseInt(idx));
      });
    });

    body.querySelectorAll('.item-label, .item-label-extra').forEach(function(lbl) {
      lbl.addEventListener('click', function(e) {
        e.stopPropagation();
        var idx = lbl.dataset.idx;
        toggleItem(lbl.dataset.evid, isNaN(idx) ? idx : parseInt(idx));
      });
    });

    body.querySelectorAll('.item-rem-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        removerItemOriginal(btn.dataset.evid, parseInt(btn.dataset.idx));
      });
    });

    body.querySelectorAll('.item-rem-extra-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var ev = _todosEventos.find(function(ev) { return ev.id === btn.dataset.evid; });
        var texto = ev && ev.itens_extras ? ev.itens_extras[parseInt(btn.dataset.idx)] : 'este item';
        if (confirm('Excluir "' + texto + '"?')) {
          removerItemExtra(btn.dataset.evid, parseInt(btn.dataset.idx));
        }
      });
    });

    body.querySelectorAll('.btn-wa-painel').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var fone = btn.getAttribute('data-wa-fone') || '';
        var numero = fone.replace(/\D/g, '');
        if (numero) {
          if (numero.length <= 11) numero = '55' + numero;
          window.open('https://wa.me/' + numero, '_blank');
          return;
        }
        if (!db) { alert('Número de contato não encontrado.'); return; }
        var evid       = btn.getAttribute('data-evid');
        var contratoId = btn.getAttribute('data-contrato-id');
        var notaId     = btn.getAttribute('data-nota-id');

        function abrirWa(foneRaw) {
          var n = (foneRaw || '').replace(/\D/g, '');
          if (!n) { alert('Número de contato não encontrado.'); return; }
          // Persiste no eventos_campo para próximas vezes
          db.collection('eventos_campo').doc(evid).update({ cli_fone: foneRaw }).catch(function(){});
          btn.setAttribute('data-wa-fone', foneRaw);
          btn.classList.add('tem-fone');
          if (n.length <= 11) n = '55' + n;
          window.open('https://wa.me/' + n, '_blank');
        }

        if (contratoId) {
          db.collection('contratos').doc(contratoId).get()
            .then(function(cDoc) { abrirWa(cDoc.exists ? cDoc.data().cli_fone || '' : ''); })
            .catch(function() { alert('Número de contato não encontrado.'); });
        } else if (notaId) {
          db.collection('notas').doc(notaId).get()
            .then(function(nDoc) { abrirWa(nDoc.exists ? nDoc.data().contato || '' : ''); })
            .catch(function() { alert('Número de contato não encontrado.'); });
        } else {
          alert('Número de contato não encontrado.');
        }
      });
    });

    body.querySelectorAll('.btn-add-item').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var evid = btn.dataset.evid;
        var form = document.getElementById('add-form-' + evid);
        if (form) {
          form.style.display = 'flex';
          var inp = form.querySelector('.add-item-input');
          if (inp) setTimeout(function(){ inp.focus(); }, 50);
        }
        btn.style.display = 'none';
      });
    });

    body.querySelectorAll('.btn-add-item-ok').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var evid = btn.dataset.evid;
        var form = document.getElementById('add-form-' + evid);
        var input = form ? form.querySelector('.add-item-input') : null;
        var val = input ? input.value.trim() : '';
        if (val) adicionarItemExtra(evid, val);
      });
    });
  });
}

function buildCard(ev, past, col) {
  var dataFmt = ev.ev_data ? ev.ev_data.split('-').reverse().join('/') : '';
  // Cor do badge de data conforme coluna e proximidade
  var badgeColor = '';
  var badgeBg = '';
  if (col === 'andamento') {
    badgeColor = 'var(--andamento)';
    badgeBg = 'var(--andamento-dim)';
  } else if (col === 'concluido') {
    badgeColor = 'var(--concluido)';
    badgeBg = 'var(--concluido-dim)';
  } else {
    // col === 'eventos' — cor por proximidade
    if (past) {
      badgeColor = '#555'; badgeBg = 'rgba(85,85,85,0.15)';
    } else if (ev.ev_data) {
      var parts = ev.ev_data.split('-');
      var evDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
      var hoje = new Date(); hoje.setHours(0,0,0,0);
      var diff = Math.round((evDate - hoje) / 86400000);
      if (diff <= 1) {
        badgeColor = '#e05c5c'; badgeBg = 'rgba(224,92,92,0.15)'; // vermelho
      } else if (diff < 7) {
        badgeColor = 'var(--montar)'; badgeBg = 'var(--montar-dim)'; // azul
      } else {
        badgeColor = '#aaa'; badgeBg = 'rgba(170,170,170,0.12)'; // cinza claro
      }
    }
  }
  var badgeStyle = badgeColor ? ' style="color:' + badgeColor + ';background:' + badgeBg + '"' : '';
  function fmtHora(val) {
    if (!val) return '';
    var v = val.trim();
    var digits = v.replace(/\D/g, '');
    if (!digits) return v; // texto puro — retorna como está
    var h, m;
    if (digits.length <= 2) { h = digits; m = '00'; }
    else if (digits.length === 3) { h = digits.slice(0,1); m = digits.slice(1); }
    else { h = digits.slice(0,2); m = digits.slice(2,4); }
    // Se tinha texto junto com números (ex: "segunda 14h") — mantém o texto + hora formatada
    var horaFmt = h.padStart(2,'0') + ':' + (m||'00').padStart(2,'0');
    var semNumeros = v.replace(/[\d:hH]/g, '').trim().replace(/[-–]/g, '').trim();
    return semNumeros ? semNumeros + ' ' + horaFmt : horaFmt;
  }
  var horarioLinha1 = ''; // Mont. · Iníc.
  var horarioLinha2 = ''; // Fim · Desm.
  var temHorario = ev.ev_montagem || ev.ev_inicio || ev.ev_fim || ev.ev_desmontagem;
  if (temHorario) {
    var l1 = [];
    var l2 = [];
    if (ev.ev_montagem) l1.push('Mont. ' + fmtHora(ev.ev_montagem));
    if (ev.ev_inicio)   l1.push('Iníc. ' + fmtHora(ev.ev_inicio));
    if (ev.ev_fim)      l2.push('Fim ' + fmtHora(ev.ev_fim));
    if (ev.ev_desmontagem) l2.push('Desm. ' + fmtHora(ev.ev_desmontagem));
    horarioLinha1 = l1.join(' · ');
    horarioLinha2 = l2.join(' · ');
  }
  var horarioBlock = '';
  var horarioInline = '';
  if (ev.nota_id && temHorario) {
    // Eventos de nota: Iníc. e Fim na mesma linha separados por " • "
    var partes = [];
    if (ev.ev_montagem) partes.push('Mont. ' + fmtHora(ev.ev_montagem));
    if (ev.ev_inicio)   partes.push('Iníc. ' + fmtHora(ev.ev_inicio));
    if (ev.ev_fim)      partes.push('Fim ' + fmtHora(ev.ev_fim));
    if (ev.ev_desmontagem) partes.push('Desm. ' + fmtHora(ev.ev_desmontagem));
    horarioBlock = partes.join('<span class="horario-sep">•</span>');
  } else {
    horarioBlock = [horarioLinha1, horarioLinha2].filter(Boolean).join('\n');
  }
  var resp = ev.ev_resp ? '<div class="card-resp card-field-editable" data-field="ev_resp" data-evid="' + esc(ev.id) + '">Resp: <span>' + esc(ev.ev_resp) + '</span></div>' : '';
  var itens = '';
  if ((ev.servicos && ev.servicos.length) || (ev.itens_extras && ev.itens_extras.length)) {
    var removidos = ev.itens_removidos || {};
    // Expandir itens que contenham "•" em itens separados (mantendo índice original para check/remove)
    var servicosExpandidos = [];
    (ev.servicos || []).forEach(function(s, origIdx) {
      if (s && s.indexOf('•') >= 0) {
        s.split('•').forEach(function(parte) {
          var p = parte.trim();
          if (p) servicosExpandidos.push({ texto: p, idx: origIdx });
        });
      } else {

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Drag & Drop ──
var _dragScrollInterval = null;

function onDragStart(e, id) {
  _draggingId = id;
  var card = document.querySelector('.evento-card[data-id="' + id + '"]');
  if (card) {
    // Criar fantasma limpo — só o card-summary, sem o corpo expandido
    var ghost = document.createElement('div');
    ghost.style.cssText = [
      'position:fixed', 'top:-9999px', 'left:-9999px',
      'width:' + card.offsetWidth + 'px',
      'background:#2a2a2a',
      'border:1px solid #444',
      'border-radius:8px',
      'padding:12px 14px',
      'box-shadow:0 4px 20px rgba(0,0,0,0.6)',
      'pointer-events:none',
      'font-family:Barlow,sans-serif',
      'color:#eee'
    ].join(';');
    var summary = card.querySelector('.card-summary');
    if (summary) ghost.innerHTML = summary.outerHTML;
    document.body.appendChild(ghost);
    e.dataTransfer.setDragImage(ghost, card.offsetWidth / 2, 30);
    setTimeout(function() {
      card.classList.add('dragging');
      if (ghost.parentNode) ghost.parentNode.removeChild(ghost);
    }, 0);
  }
  e.dataTransfer.effectAllowed = 'move';
  document.addEventListener('dragover', onDragScroll);
}

function onDragScroll(e) {
  var board = document.querySelector('.board-container');
  if (!board) return;
  var rect = board.getBoundingClientRect();
  var edge = 80;
  var x = e.clientX - rect.left;
  if (x < edge) {
    board.scrollLeft -= Math.max(2, (edge - x) / 4);
  } else if (x > rect.width - edge) {
    board.scrollLeft += Math.max(2, (x - (rect.width - edge)) / 4);
  }
}

function snapBoardToColumn() {
  var board = document.querySelector('.board-container');
  var col = document.querySelector('.column');
  if (!board || !col) return;
  var colW = col.offsetWidth + 20;
  var current = board.scrollLeft / colW;
  // Snap to nearest column — requires passing 20% of column to advance
  var nearest = Math.floor(current + 0.2);
  nearest = Math.max(0, Math.min(2, nearest));
  board.scrollTo({ left: nearest * colW, behavior: 'smooth' });
}

function onDragOverBoard(e) {
  // Permite drop na área vazia do board
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function onDropBoard(e) {
  // Solto em área vazia — mover para coluna mais próxima visível
  e.preventDefault();
  onDragLeave(e);
  if (!_draggingId) return;
  // Descobrir qual coluna está mais próxima do ponto de drop
  var cols = ['eventos', 'andamento', 'concluido'];
  var closest = cols[0];
  var minDist = Infinity;
  cols.forEach(function(col) {
    var el = document.getElementById('col-' + col);
    if (!el) return;
    var rect = el.getBoundingClientRect();
    var cx = rect.left + rect.width / 2;
    var dist = Math.abs(e.clientX - cx);
    if (dist < minDist) { minDist = dist; closest = col; }
  });
  if (closest) {
    var draggedId = _draggingId;
    _draggingId = null;
    var colLabels = { eventos: 'Eventos', andamento: 'Em Andamento', concluido: 'Concluído' };
    var evBoard = _todosEventos.find(function(x) { return x.id === draggedId; });
    var nomeBoard = evBoard ? (evBoard.ev_nome || draggedId) : draggedId;
    db.collection('eventos_campo').doc(draggedId).update({ etapa: closest })
      .catch(function(err) { console.error('[AdQ] Erro ao mover:', err); });
    registrarLog('moveu_coluna', colLabels[closest] || closest, nomeBoard);
    recolherCardAposDrop(draggedId);
  } else {
    _draggingId = null;
  }
}

function onDragOver(e, col) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.getElementById('body-' + col).classList.add('drag-over');

}

function onDragLeave(e) {
  ['eventos','andamento','concluido'].forEach(function(col) {
    var body = document.getElementById('body-' + col);
    if (body) body.classList.remove('drag-over');
  });
}


function recolherCardAposDrop(id) {
  setTimeout(function() {
    var card = document.querySelector('.evento-card[data-id="' + id + '"]');
    if (card) card.classList.remove('expanded');
  }, 100);
}
function onDrop(e, col) {
  e.preventDefault();
  onDragLeave(e);
  if (!_draggingId) return;
  var draggedId = _draggingId;
  _draggingId = null;
  var colLabels = { eventos: 'Eventos', andamento: 'Em Andamento', concluido: 'Concluído' };
  var ev = _todosEventos.find(function(x) { return x.id === draggedId; });
  var nomeEvento = ev ? (ev.ev_nome || draggedId) : draggedId;
  db.collection('eventos_campo').doc(draggedId).update({ etapa: col })
    .catch(function(err) { console.error('Erro ao mover card:', err); });
  registrarLog('moveu_coluna', colLabels[col] || col, nomeEvento);
  recolherCardAposDrop(draggedId);
}

// ── Item check ──
function toggleItem(evId, idx) {
  var ev = _todosEventos.find(function(e) { return e.id === evId; });
  if (!ev) return;
  var itensOk = Object.assign({}, ev.itens_ok || {});
  itensOk[idx] = !itensOk[idx];
  // Atualizar estado local imediatamente (evita estado antigo em cliques rápidos)
  ev.itens_ok = itensOk;
  db.collection('eventos_campo').doc(evId).update({ itens_ok: itensOk });
  // Sincronizar de volta com nota de origem, se houver
  if (ev.nota_id) {
    db.collection('notas').doc(ev.nota_id).update({ itens_ok: itensOk })
      .catch(function(e) { console.warn('Erro ao sincronizar checklist na nota:', e); });
  }
  registrarLog('checklist_preencheu', '', ev.ev_nome || evId);
}

function removerItemOriginal(evId, idx) {
  var ev = _todosEventos.find(function(e) { return e.id === evId; });
  if (!ev) return;
  var removidos = Object.assign({}, ev.itens_removidos || {});
  removidos[idx] = !removidos[idx];
  db.collection('eventos_campo').doc(evId).update({ itens_removidos: removidos });
  registrarAlteracao(evId, removidos[idx] ? 'removeu' : 'restaurou', ev.servicos[idx]);
}

function adicionarItemExtra(evId, texto) {
  var ev = _todosEventos.find(function(e) { return e.id === evId; });
  if (!ev) return;
  var extras = (ev.itens_extras || []).concat([texto]);
  db.collection('eventos_campo').doc(evId).update({ itens_extras: extras });
  registrarAlteracao(evId, 'adicionou', texto);
}

function removerItemExtra(evId, idx) {
  var ev = _todosEventos.find(function(e) { return e.id === evId; });
  if (!ev) return;
  var extras = (ev.itens_extras || []).filter(function(_, i) { return i !== idx; });
  db.collection('eventos_campo').doc(evId).update({ itens_extras: extras });
  registrarAlteracao(evId, 'removeu extra', (ev.itens_extras || [])[idx] || '');
}

function registrarAlteracao(evId, acao, item) {
  registrarLog(acao, item, evId);
}

function registrarLog(tipo, item, contexto) {
  if (!db || !auth.currentUser) return;
  db.collection('acessos_painel').add({
    email:     auth.currentUser.email,
    usuario:   auth.currentUser.email.split('@')[0],
    uid:       auth.currentUser.uid,
    tipo:      tipo,
    item:      item || '',
    contexto:  contexto || '',
    data:      firebase.firestore.FieldValue.serverTimestamp()
  });
}
</script>

function getWeekRange() {
  var now = new Date();
  var day = now.getDay(); // 0=sun
  var monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  monday.setHours(0,0,0,0);
  var sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23,59,59,999);
  return { start: monday, end: sunday };
}

function matchesPeriodo(ev, periodo) {
  if (periodo === 'todos') return true;
  if (periodo === 'realizados') return isPast(ev);
  if (!ev.ev_data) return false;
  var parts = ev.ev_data.split('-');
  var evDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  var now = new Date();
  if (periodo === 'semana') {
    var range = getWeekRange();
    return evDate >= range.start && evDate <= range.end;
  }
  if (periodo === '30dias') {
    var hoje = new Date(); hoje.setHours(0,0,0,0);
    var fim30 = new Date(hoje); fim30.setDate(hoje.getDate() + 30);
    return evDate >= hoje && evDate <= fim30;
  }
  if (periodo === 'mes') {
    return evDate.getMonth() === now.getMonth() && evDate.getFullYear() === now.getFullYear();
  }
  if (periodo === 'ano') {
    return evDate.getFullYear() === now.getFullYear();
  }
  return true;
}

function isPast(ev) {
  if (!ev.ev_data) return false;
  var parts = ev.ev_data.split('-');
  var evDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  evDate.setHours(23,59,59,999);
  return evDate < new Date();
}

function getWeekLabel(ev) {
  if (!ev.ev_data) return 'Sem data';
  var parts = ev.ev_data.split('-');
  var evDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  var now = new Date();
  var range = getWeekRange();
  if (evDate >= range.start && evDate <= range.end) return 'Esta semana';
  var nextStart = new Date(range.start); nextStart.setDate(range.start.getDate() + 7);
  var nextEnd = new Date(range.end); nextEnd.setDate(range.end.getDate() + 7);
  if (evDate >= nextStart && evDate <= nextEnd) return 'Proxima semana';
  var meses = ['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return meses[evDate.getMonth()] + ' ' + evDate.getFullYear();
}

// Snap board to column on finger scroll
document.addEventListener('DOMContentLoaded', function() {
  // Data de hoje no cabeçalho
  var hd = document.getElementById('header-date');
  if (hd) {
    var now = new Date();
    var dias = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
    var meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    hd.textContent = dias[now.getDay()] + ', ' + now.getDate() + ' de ' + meses[now.getMonth()] + ' de ' + now.getFullYear();
  }

  var board = document.querySelector('.board-container');
  if (!board) return;
  var snapTimeout = null;
  var lastScrollLeft = 0;
  var scrollVelocity = 0;
  var magnetInterval = null;

  var isSnapping = false;
  var rafId = null;

  function getColW() {
    var col = document.querySelector('.column');
    return col ? col.offsetWidth + 20 : 0;
  }

  function snapTo(idx) {
    var colW = getColW();
    if (!colW) return;
    idx = Math.max(0, Math.min(2, idx));
    isSnapping = true;
    if (rafId) cancelAnimationFrame(rafId);
    var dest = idx * colW;
    var start = board.scrollLeft;
    var distance = dest - start;
    var duration = Math.max(150, Math.min(280, Math.abs(distance) * 0.6));
    var startTime = null;

    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

    function step(ts) {
      if (!startTime) startTime = ts;
      var elapsed = ts - startTime;
      var progress = Math.min(elapsed / duration, 1);
      board.scrollLeft = start + distance * easeOutCubic(progress);
      if (progress < 1) {
        rafId = requestAnimationFrame(step);
      } else {
        board.scrollLeft = dest;
        isSnapping = false;
        rafId = null;
      }
    }
    rafId = requestAnimationFrame(step);
  }

  function startMagnet() {}
  function stopMagnet() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    isSnapping = false;
  }

  var touchStartX = 0;
  var touchStartY = 0;
  var touchStartScrollLeft = 0;
  var touchStartCol = 0;
  var touchPrevX = 0;
  var touchPrevTime = 0;
  var touchCurX = 0;
  var touchCurTime = 0;
  var touchDirection = null; // 'h' = horizontal, 'v' = vertical, null = undecided

  board.addEventListener('touchstart', function(e) {
    if (_draggingId) return;
    stopMagnet();
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchPrevX = touchStartX;
    touchPrevTime = Date.now();
    touchCurX = touchStartX;
    touchCurTime = touchPrevTime;
    touchDirection = null;
    var colW = getColW();
    touchStartScrollLeft = board.scrollLeft;
    touchStartCol = colW ? Math.round(board.scrollLeft / colW) : 0;
  }, {passive: true});

  board.addEventListener('touchmove', function(e) {
    if (_draggingId || isSnapping) return;

    var dx = touchStartX - e.touches[0].clientX;
    var dy = touchStartY - e.touches[0].clientY;

    // Determine direction on first significant move
    if (touchDirection === null && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
      touchDirection = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
    }

    // Only intercept horizontal swipes
    if (touchDirection !== 'h') return;

    e.preventDefault();
    touchPrevX = touchCurX;
    touchPrevTime = touchCurTime;
    touchCurX = e.touches[0].clientX;
    touchCurTime = Date.now();
    board.scrollLeft = touchStartScrollLeft + dx;
  }, {passive: false});

  board.addEventListener('touchend', function() {
    if (_draggingId) return;
    var colW = getColW();
    if (!colW) return;

    var dt = touchCurTime - touchPrevTime;
    var dxRecent = touchPrevX - touchCurX;
    var velocity = dt > 0 ? dxRecent / dt : 0;

    var target;
    if (Math.abs(velocity) > 0.3) {
      target = velocity > 0
        ? Math.min(2, touchStartCol + 1)
        : Math.max(0, touchStartCol - 1);
    } else {
      var fraction = (board.scrollLeft - touchStartScrollLeft) / colW;
      if (fraction > 0.20) {
        target = Math.min(2, touchStartCol + 1);
      } else if (fraction < -0.20) {
        target = Math.max(0, touchStartCol - 1);
      } else {
        target = touchStartCol;
      }
    }
    snapTo(target);
  }, {passive: true});
});

// ═══ SINCRONIZAÇÃO DO PAINEL ═══
function sincronizarPainel() {
  if (!db) return;
  console.log('[Painel] Sincronizando...');

  // 1. Busca TODOS os contratos (não só aprovados)
  db.collection('contratos').get().then(function(contratosSnap) {
    var todosContratos = {};
    var assinados = {};
    contratosSnap.forEach(function(doc) {
      todosContratos[doc.id] = doc.data();
      if (doc.data().aprovado) assinados[doc.id] = doc.data();
    });

    // 2. Busca todos os eventos do painel
    db.collection('eventos_campo').get().then(function(eventosSnap) {
      var batch = db.batch();
      var mudou = false;

      // Remove APENAS eventos cujo contrato foi EXCLUÍDO do banco
      // Eventos adicionados manualmente pelo botão Painel permanecem independente do status
      eventosSnap.forEach(function(doc) {
        var d = doc.data();
        // Se veio de uma nota, não remover
        if (d.nota_id) return;
        var cid = d.contrato_id;
        // Só remove se o contrato não existe mais no banco
        if (cid && !todosContratos[cid]) {
          console.log('[Painel] Removendo evento orfao (contrato excluido):', doc.id);
          batch.delete(doc.ref);
          mudou = true;
        }
      });

      // Adiciona contratos assinados que ainda não estão no painel
      // (respeita removido_manualmente: true — não recria eventos removidos pelo usuário)
      var eventosExistentes = {};
      eventosSnap.forEach(function(doc) {
        var cid = doc.data().contrato_id;
        if (cid) eventosExistentes[cid] = true;
      });

      Object.keys(assinados).forEach(function(cid) {
        if (!eventosExistentes[cid] && !assinados[cid].removido_manualmente) {
          console.log('[Painel] Adicionando contrato assinado ausente:', cid);
          var d = assinados[cid];
          var ref = db.collection('eventos_campo').doc(cid);
          batch.set(ref, {
            ev_nome:     d.ev_nome   || '',
            ev_local:    d.ev_local  || '',
            ev_maps:     d.ev_maps   || '',
            ev_data:     d.ev_data   || '',
            ev_inicio:      d.ev_inicio      || '',
            ev_fim:         d.ev_fim         || '',
            ev_montagem:    d.montagem       || '',
            ev_desmontagem: d.desmontagem    || '',
            ev_resp:     d.ev_resp   || '',
            cli_nome:    d.cli_nome  || '',
            servicos:    d.servicos  || [],
            itens_ok:    {},
            etapa:       'eventos',
            contrato_id: cid,
            criadoEm:    new Date()
          });
          mudou = true;
        }
      });

      if (mudou) {
        batch.commit().then(function() {
          console.log('[Painel] Sincronizacao concluida.');
        });
      } else {
        console.log('[Painel] Tudo em dia, nada a sincronizar.');
      }
    });
  }).catch(function(e) {
    console.error('[Painel] Erro na sincronizacao:', e);
  });
}

function onRefresh() {
  var btn = document.querySelector('.btn-refresh');
  if (btn) btn.classList.add('spinning');
  sincronizarPainel();
  setTimeout(function() {
    if (btn) btn.classList.remove('spinning');
  }, 1000);
}

    var slider = document.getElementById('adm-slider');
    if (slider) slider.scrollTo({ left: idx * slider.offsetWidth, behavior: 'smooth' });
  }

var _admPermEmailsAtuais = [];

function _admPermCarregar() {

  _admPermCarregarSecao('permissoes_historico', EMAILS_HISTORICO_PADRAO, 'adm-perm-hist-lista',   function(list) { _admPermHistEmailsAtuais = list; });
  _admPermCarregarSecao('permissoes_responsaveis', [], 'adm-perm-resp-lista', function(list) { _admPermRespEmailsAtuais = list; });
}

function _admPermCarregarSecao(docId, padrao, listaId, onLoad) {
  var lista = document.getElementById(listaId);
  if (!lista) return;
  lista.innerHTML = '<div style="font-size:0.75rem;color:#555">Carregando...</div>';
  db.collection('configuracoes').doc(docId).get()
    .then(function(doc) {
      var emails = doc.exists && doc.data().emails ? doc.data().emails : padrao.slice();
      onLoad(emails);
      _admPermRenderSecao(listaId, emails, docId, padrao, onLoad);
    })
    .catch(function() {
      onLoad(padrao.slice());
      _admPermRenderSecao(listaId, padrao.slice(), docId, padrao, onLoad);
    });
}

function _admPermRenderSecao(listaId, emails, docId, padrao, onLoad) {
  var lista = document.getElementById(listaId);
  if (!lista) return;
  if (!emails.length) {
    lista.innerHTML = '<div style="font-size:0.72rem;color:#555;font-style:italic">Nenhum e-mail com permissão.</div>';
    return;
  }
  lista.innerHTML = emails.map(function(email, i) {
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1e1e1e">' +
      '<span style="font-size:0.74rem;color:#ccc">' + email + '</span>' +
      '<button onclick="_admPermRemoverSecao(\'' + listaId + '\',\'' + docId + '\',' + i + ')" title="Remover" style="background:none;border:none;color:#555;cursor:pointer;font-size:1rem;padding:0 2px;line-height:1" onmouseover="this.style.color=\'#e05c5c\'" onmouseout="this.style.color=\'#555\'">×</button>' +
      '</div>';
  }).join('');
}

// Mapa auxiliar para acessar os arrays corretos por docId
function _admPermGetArray(docId) {
  if (docId === 'permissoes_orcamento') return _admPermEmailsAtuais;
  if (docId === 'permissoes_editor')    return _admPermEditorEmailsAtuais;
  if (docId === 'permissoes_historico') return _admPermHistEmailsAtuais;
  if (docId === 'permissoes_responsaveis') return _admPermRespEmailsAtuais;
  return [];
}
function _admPermSetArray(docId, arr) {
  if (docId === 'permissoes_orcamento') _admPermEmailsAtuais = arr;
  if (docId === 'permissoes_editor')    _admPermEditorEmailsAtuais = arr;
  if (docId === 'permissoes_historico') _admPermHistEmailsAtuais = arr;
  if (docId === 'permissoes_responsaveis') _admPermRespEmailsAtuais = arr;
}

function _admPermRemoverSecao(listaId, docId, idx) {
  var arr = _admPermGetArray(docId).slice();
  arr.splice(idx, 1);
  _admPermSetArray(docId, arr);
  _admPermSalvarSecao(docId, arr, listaId);
}

function _admPermSalvarSecao(docId, arr, listaId) {
  db.collection('configuracoes').doc(docId).set({ emails: arr })
    .then(function() {
      _admPermRenderSecao(listaId, arr, docId, [], function(l) { _admPermSetArray(docId, l); });
      // Reaplicar permissão ao usuário atual imediatamente
      var u = auth.currentUser;
      if (u) {
        if (docId === 'permissoes_orcamento') _aplicarPermissaoVoltar(u.email, arr);
        if (docId === 'permissoes_editor')    _aplicarPermissaoEditor(u.email, arr);
        if (docId === 'permissoes_historico') _aplicarPermissaoHistorico(u.email, arr);
        if (docId === 'permissoes_responsaveis') renderBoard();
      }
      _editorToast('Permissões atualizadas!');
    })
    .catch(function(err) { _editorToast('Erro ao salvar: ' + err.message, true); });
}

function _admPermAdicionarSecao(inputId, docId, listaId) {
  var input = document.getElementById(inputId);
  if (!input) return;
  var email = input.value.trim().toLowerCase();
  if (!email || email.indexOf('@') < 0) {
    input.style.borderColor = '#e05c5c';
    setTimeout(function() { input.style.borderColor = '#2a2a2a'; }, 1500);
    return;
  }
  var arr = _admPermGetArray(docId);
  if (arr.indexOf(email) >= 0) { input.value = ''; return; }
  arr = arr.concat([email]);
  _admPermSetArray(docId, arr);
  input.value = '';
  _admPermSalvarSecao(docId, arr, listaId);
}

// Helper: gera HTML da barrinha de responsáveis (segmentos com gap)
function _buildRespBarHTML(responsaveis) {
  if (!responsaveis || !responsaveis.length) return '';
  var colors = responsaveis.map(function(uid) {
    var u = (_usuariosCadastrados || []).find(function(x) { return x.uid === uid; });
    return u ? u.cor : '#888';
  });
  // Barra: fundo neutro cinza ocupando quase toda a largura
  // Canto direito: listras coloridas finas por responsável (discreto, identificável)
  var colorSegs = '';
  colors.forEach(function(c) {
    colorSegs += '<div class="card-resp-bar-color" style="background:' + c + '"></div>';
  });
  return '<div class="card-resp-bar"><div class="card-resp-bar-track"></div><div class="card-resp-bar-colors">' + colorSegs + '</div></div>';
}

function _admUsersCarregar() {

function _admUsersRenderColorSwatches() {
  var container = document.getElementById('adm-users-color-swatches');
  if (!container) return;
  container.innerHTML = _CORES_USUARIOS.map(function(cor) {
    var active = cor === _admUserCorSelecionada ? ' active' : '';
    return '<div class="color-swatch' + active + '" style="background:' + cor + '" data-cor="' + cor + '" onclick="_admUsersSelectCor(\'' + cor + '\')"></div>';
  }).join('');
}

function _admUsersSelectCor(cor) {
  _admUserCorSelecionada = cor;
  var dot = document.getElementById('adm-users-cor-selecionada');
  if (dot) dot.style.background = cor;
  _admUsersRenderColorSwatches();
  // Se estiver editando um usuário existente, aplica e salva imediatamente
  if (_admUserEditandoIdx !== null && _usuariosCadastrados[_admUserEditandoIdx]) {
    _usuariosCadastrados[_admUserEditandoIdx].cor = cor;
    _admUserEditandoIdx = null;
    var picker = document.getElementById('adm-users-color-picker');
    if (picker) picker.style.display = 'none';
    _admUsersSalvar();
  }
}

function _admUsersEditarCor(idx) {
  // Modo edição: selecionar cor de um usuário já cadastrado
  _admUserEditandoIdx = idx;
  var u = _usuariosCadastrados[idx];
  if (!u) return;
  _admUserCorSelecionada = u.cor || '#888';
  // Posiciona e exibe o picker inline abaixo da linha do usuário
  var picker = document.getElementById('adm-users-color-picker');
  if (!picker) return;
  picker.style.display = 'block';
  // Atualiza o dot do picker para refletir a cor atual
  var dot = document.getElementById('adm-users-cor-selecionada');
  if (dot) dot.style.background = _admUserCorSelecionada;
  _admUsersRenderColorSwatches();
  picker.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

var _admUserEditandoIdx = null;

function _admUsersToggleColorPicker() {
  var picker = document.getElementById('adm-users-color-picker');
  if (!picker) return;
  picker.style.display = picker.style.display === 'none' ? 'block' : 'none';
  _admUsersRenderColorSwatches();
}

function _admUsersRender() {
  var lista = document.getElementById('adm-users-lista');
  if (!lista) return;
  if (!_usuariosCadastrados.length) {
    lista.innerHTML = '<div style="font-size:0.72rem;color:#555;font-style:italic">Nenhum usuário cadastrado.</div>';
    return;
  }
  lista.innerHTML = _usuariosCadastrados.map(function(u, i) {
    return '<div class="adm-user-row">' +
      '<div class="adm-user-dot" style="background:' + (u.cor || '#888') + ';cursor:pointer" onclick="_admUsersEditarCor(' + i + ')" title="Trocar cor"></div>' +
      '<span class="adm-user-email">' + u.email + '</span>' +
      '<button onclick="_admUsersRemover(' + i + ')" title="Remover" style="background:none;border:none;color:#555;cursor:pointer;font-size:1rem;padding:0 4px;line-height:1" onmouseover="this.style.color=\'#e05c5c\'" onmouseout="this.style.color=\'#555\'">x</button>' +
    '</div>';
  }).join('');
}

function _admUsersAdicionar() {
  var input = document.getElementById('adm-users-novo-email');
  if (!input) return;
  var email = input.value.trim().toLowerCase();
  if (!email || email.indexOf('@') < 0) {
    input.style.borderColor = '#e05c5c';
    setTimeout(function() { input.style.borderColor = '#2a2a2a'; }, 1500);
    return;
  }
  var uid = email;
  if (_usuariosCadastrados.find(function(u) { return u.uid === uid; })) { input.value = ''; return; }
  _usuariosCadastrados = _usuariosCadastrados.concat([{ uid: uid, email: email, cor: _admUserCorSelecionada }]);
  input.value = '';
  _admUsersSalvar();
  var picker = document.getElementById('adm-users-color-picker');
  if (picker) picker.style.display = 'none';
}

function _admUsersRemover(idx) {
  _usuariosCadastrados = _usuariosCadastrados.filter(function(_, i) { return i !== idx; });
  _admUsersSalvar();
}

function _admUsersSalvar() {
  if (!db) return;
  db.collection('configuracoes').doc('usuarios_cadastrados').set({ usuarios: _usuariosCadastrados })
    .then(function() { _admUsersRender(); _editorToast('Usuarios salvos!'); renderBoard(); })
    .catch(function(err) { _editorToast('Erro: ' + err.message, true); });
}


function _abrirModalResponsaveis(evid) {
  var existing = document.getElementById('modal-responsaveis');
  if (existing) existing.remove();

  var abrirCom = function(usuarios) {
    var evData = _eventosCache ? _eventosCache[evid] : null;
    var selecionados = (evData && evData.responsaveis) ? evData.responsaveis.slice() : [];

    var overlay = document.createElement('div');
    overlay.id = 'modal-responsaveis';
    overlay.className = 'modal-resp-overlay';

    var listaHtml = '';
    if (!usuarios.length) {
      listaHtml = '<div style="padding:20px 0;text-align:center;font-size:0.78rem;color:#555">Nenhum usuario cadastrado.<br>Adicione em Painel Admin > Usuarios.</div>';
    } else {
      listaHtml = usuarios.map(function(u) {
        var sel = selecionados.indexOf(u.uid) >= 0;
        var checkSvg = sel ? '<svg width="10" height="8" viewBox="0 0 10 8" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4 4,7 9,1"/></svg>' : '';
        return '<div class="modal-resp-item' + (sel ? ' selected' : '') + '" data-uid="' + u.uid + '" onclick="_toggleResponsavelItem(this)">' +
          '<div class="modal-resp-dot" style="background:' + (u.cor || '#888') + '"></div>' +
          '<span class="modal-resp-name">' + u.email + '</span>' +
          '<div class="modal-resp-check">' + checkSvg + '</div>' +
        '</div>';
      }).join('');
    }

    overlay.innerHTML =
      '<div class="modal-resp-box">' +
        '<div class="modal-resp-header">' +
          '<span class="modal-resp-title">Responsaveis pelo evento</span>' +
          '<button id="btn-close-resp-modal" style="background:transparent;border:1px solid #333;color:#666;border-radius:4px;width:28px;height:28px;cursor:pointer;font-size:1rem;line-height:1;flex-shrink:0">x</button>' +
        '</div>' +
        '<div class="modal-resp-list" id="modal-resp-list-inner">' + listaHtml + '</div>' +
        '<div class="modal-resp-footer">' +
          '<button id="btn-cancel-resp-modal" style="background:transparent;border:1px solid #333;color:#666;border-radius:4px;padding:7px 16px;font-family:\'Barlow Condensed\',sans-serif;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer">Cancelar</button>' +
          '<button id="btn-save-resp-modal" style="background:#7B22B8;color:#fff;border:none;border-radius:4px;padding:7px 16px;font-family:\'Barlow Condensed\',sans-serif;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer">Salvar</button>' +
        '</div>' +
      '</div>';

    overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);

    document.getElementById('btn-close-resp-modal').onclick = function() { overlay.remove(); };
    document.getElementById('btn-cancel-resp-modal').onclick = function() { overlay.remove(); };
    document.getElementById('btn-save-resp-modal').onclick = function() { _salvarResponsaveis(evid); };
  };

  if (_usuariosCadastrados && _usuariosCadastrados.length) {
    abrirCom(_usuariosCadastrados);
  } else if (db) {
    db.collection('configuracoes').doc('usuarios_cadastrados').get()
      .then(function(doc) {
        _usuariosCadastrados = doc.exists && doc.data().usuarios ? doc.data().usuarios : [];
        abrirCom(_usuariosCadastrados);
      })
      .catch(function() { abrirCom([]); });
  } else {
    abrirCom([]);
  }
}

function _toggleResponsavelItem(el) {
  el.classList.toggle('selected');
  var check = el.querySelector('.modal-resp-check');
  if (check) {
    check.innerHTML = el.classList.contains('selected')
      ? '<svg width="10" height="8" viewBox="0 0 10 8" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4 4,7 9,1"/></svg>'
      : '';
  }
}

function _salvarResponsaveis(evid) {
  var list = document.getElementById('modal-resp-list-inner');
  if (!list) return;
  var selecionados = [];
  list.querySelectorAll('.modal-resp-item.selected').forEach(function(el) {
    selecionados.push(el.getAttribute('data-uid'));
  });

  if (!db) {
    var modal = document.getElementById('modal-responsaveis');
    if (modal) modal.remove();
    return;
  }
  db.collection('eventos_campo').doc(evid).update({ responsaveis: selecionados })
    .then(function() {
      if (_eventosCache && _eventosCache[evid]) {
        _eventosCache[evid].responsaveis = selecionados;
      }
      var modal = document.getElementById('modal-responsaveis');
      if (modal) modal.remove();
      _editorToast('Responsaveis salvos!');
      _atualizarBarrinhaCard(evid, selecionados);
    })
    .catch(function(err) { _editorToast('Erro: ' + err.message, true); });
}

function _atualizarBarrinhaCard(evid, responsaveis) {
  var card = document.querySelector('.evento-card[data-id="' + evid + '"]');
  if (!card) return;
  var bar = card.querySelector('.card-resp-bar');
  if (bar) bar.remove();

  var html = _buildRespBarHTML(responsaveis);
  if (!html) return;
  var tmp = document.createElement('div');
  tmp.innerHTML = html;
  card.insertBefore(tmp.firstChild, card.firstChild);
}


function _carregarAcessosAdmin() {
  if (!db) return;
  var lista = document.getElementById('adm-acessos-lista');
  if (!lista) return;
  lista.innerHTML = '<div style="padding:20px 22px;text-align:center;font-size:0.8rem;color:#555">Carregando...</div>';
  db.collection('acessos_painel').limit(200).get().then(function(snap) {
    if (snap.empty) { lista.innerHTML = '<div style="padding:20px 22px;text-align:center;font-size:0.8rem;color:#555">Nenhum registro ainda.</div>'; return; }
    var docs = [];
    snap.forEach(function(doc) { docs.push(doc.data()); });
    docs.sort(function(a, b) {
      var ta = a.data && a.data.toDate ? a.data.toDate().getTime() : 0;
      var tb = b.data && b.data.toDate ? b.data.toDate().getTime() : 0;
      return tb - ta;
    });
    var categorias = [
      { id: 'status',  titulo: 'Status',  tipos: ['moveu_coluna','checklist_preencheu'] },
      { id: 'edicoes', titulo: 'Edições', tipos: ['adicionou','removeu','restaurou','removeu extra','alteracao_item'] },
      { id: 'sessao',  titulo: 'Sessão',  tipos: ['entrada','saida'] }
    ];
    var tipoLabel = {
      'moveu_coluna':        { label: 'Moveu coluna',        cor: '#4A90C8' },
      'checklist_preencheu': { label: 'Preencheu checklist', cor: '#4AC87A' },
      'adicionou':           { label: 'Adicionou',           cor: '#4AC87A' },
      'removeu':             { label: 'Removeu',             cor: '#e05c5c' },
      'restaurou':           { label: 'Restaurou',           cor: '#7B22B8' },
      'removeu extra':       { label: 'Removeu extra',       cor: '#e05c5c' },
      'alteracao_item':      { label: 'Alteração',           cor: '#4A90C8' },
      'entrada':             { label: 'Entrada',             cor: '#4AC87A' },
      'saida':               { label: 'Saída',               cor: '#888'   }
    };
    var tipoParaCat = {};
    categorias.forEach(function(cat) { cat.tipos.forEach(function(t) { tipoParaCat[t] = cat.id; }); });
    var grupos = {};
    categorias.forEach(function(cat) { grupos[cat.id] = []; });
    docs.forEach(function(d) { var c = tipoParaCat[d.tipo || '']; if (c) grupos[c].push(d); });

    function renderItem(d) {
      var ts = d.data && d.data.toDate ? d.data.toDate() : null;
      var dataFmt = ts ? ts.toLocaleDateString('pt-BR') + ' ' + ts.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}) : '—';
      var tl = tipoLabel[d.tipo || ''] || { label: d.tipo || '—', cor: '#888' };
      var detalhe = '';
      if (d.item) detalhe += '<span style="color:#555"> · ' + esc(d.item) + '</span>';
      if (d.contexto) detalhe += '<span style="color:#444"> · ' + esc(d.contexto) + '</span>';
      return '<div style="padding:10px 22px;border-bottom:1px solid #1e1e1e">' +
        '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">' +
          '<span style="font-size:0.74rem;font-weight:700;color:' + tl.cor + '">' + tl.label + '</span>' +
          '<span style="font-size:0.66rem;color:#444;white-space:nowrap">' + dataFmt + '</span>' +
        '</div>' +
        '<div style="font-size:0.70rem;color:#666;margin-top:2px">' + esc(d.usuario || d.email || '') + detalhe + '</div>' +
      '</div>';
    }

    var html = '';
    categorias.forEach(function(cat) {
      var itens = grupos[cat.id] || [];
      if (!itens.length) return;
      html += '<div class="log-grupo" id="adm-log-grupo-' + cat.id + '">' +
        '<div class="log-grupo-header" onclick="(function(el){el.classList.toggle(\'aberto\')})(document.getElementById(\'adm-log-grupo-' + cat.id + '\'))" style="padding:10px 22px">' +
          '<span class="log-grupo-titulo">' + cat.titulo + '</span>' +
          '<span class="log-grupo-direita">' +
            '<span class="log-grupo-count">' + itens.length + '</span>' +
            '<span class="log-grupo-chevron">▼</span>' +
          '</span>' +
        '</div>' +
        '<div class="log-grupo-body">' + itens.map(renderItem).join('') + '</div>' +
      '</div>';
    });
    lista.innerHTML = html || '<div style="padding:20px 22px;text-align:center;font-size:0.8rem;color:#555">Nenhum registro encontrado.</div>';
  }).catch(function(e) {
    console.error('[Acessos]', e);
    lista.innerHTML = '<div style="padding:20px 22px;text-align:center;font-size:0.8rem;color:#e05c5c">Erro ao carregar.</div>';
  });
}
